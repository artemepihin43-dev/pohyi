<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CrashGame</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ═══════════════════════════════════════════════════════
     SVG SPRITE — все иконки нарисованы вручную
     viewBox 0 0 24 24, stroke-based (fill:none если не указано)
     ═══════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
<defs>

<!-- ROCKET: корпус-каплевидный + 2 боковых плавника + иллюминатор + сопло-огонь -->
<symbol id="ic-rocket" viewBox="0 0 24 24">
  <path d="M12 2.2 C9.8 3.4 7 8 7 14 L17 14 C17 8 14.2 3.4 12 2.2 Z"
        fill="currentColor"/>
  <circle cx="12" cy="9.5" r="2.2" fill="none" stroke="white" stroke-width="1.4" opacity=".65"/>
  <path d="M7 14 L3.5 19.5 L7 17.5 Z" fill="currentColor" opacity=".7"/>
  <path d="M17 14 L20.5 19.5 L17 17.5 Z" fill="currentColor" opacity=".7"/>
  <path d="M10.2 14 Q9.5 19 12 21 Q14.5 19 13.8 14 Z" fill="#ff7400"/>
  <path d="M11.2 14 Q11 18 12 19.2 Q13 18 12.8 14 Z" fill="#ffd600"/>
</symbol>

<!-- COIN: круг + знак доллара (вертикальная черта + S-кривая) -->
<symbol id="ic-coin" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"
          fill="currentColor" fill-opacity=".1"/>
  <line x1="12" y1="6" x2="12" y2="18"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M15 9 C15 7.2 9 7.2 9 10.5 C9 13.8 15 13 15 16.5 C15 19.8 9 19.8 9 18"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
</symbol>

<!-- TROPHY: чаша + две ручки + ножка + подставка -->
<symbol id="ic-trophy" viewBox="0 0 24 24">
  <path d="M7 3 L7 11 Q7 16 12 16 Q17 16 17 11 L17 3 Z"
        stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <path d="M7 6 Q4 6 4 9 Q4 12 7 12"
        stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M17 6 Q20 6 20 9 Q20 12 17 12"
        stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="12" y1="16" x2="12" y2="19.5"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M8.5 19.5 L8.5 21 L15.5 21 L15.5 19.5"
        stroke="currentColor" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="7.5" y1="21" x2="16.5" y2="21"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</symbol>

<!-- CLOCK: окружность + часовая стрелка вверх + минутная стрелка вправо + центр -->
<symbol id="ic-clock" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
  <line x1="12" y1="12" x2="12" y2="6.5"
        stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="16.5" y2="14.5"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="12" cy="12" r="1.3" fill="currentColor"/>
</symbol>

<!-- EXPLOSION: 10-лучевая звезда (взрыв/краш) -->
<symbol id="ic-explosion" viewBox="0 0 24 24">
  <path d="M12 2 L13.6 8.8 L20 6 L16 11.5 L22 13.5 L16 15 L19.5 21 L13 17.5
           L12 22 L11 17.5 L4.5 21 L8 15 L2 13.5 L8 11.5 L4 6 L10.4 8.8 Z"
        fill="currentColor"/>
</symbol>

<!-- CHECK: жирная галочка -->
<symbol id="ic-check" viewBox="0 0 24 24">
  <polyline points="3.5,13 9,19.5 20.5,5.5"
            stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</symbol>

<!-- CLOSE (X): два диагональных штриха -->
<symbol id="ic-close" viewBox="0 0 24 24">
  <line x1="5" y1="5" x2="19" y2="19"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="5" x2="5" y2="19"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
</symbol>

<!-- TARGET (прицел): два кольца + 4 засечки + центральный круг -->
<symbol id="ic-target" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
  <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
  <circle cx="12" cy="12" r="1.8" fill="currentColor"/>
  <line x1="12" y1="2.5" x2="12" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="18" x2="12" y2="21.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="2.5" y1="12" x2="6" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="12" x2="21.5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</symbol>

<!-- CASHOUT: стрелка вверх из прямоугольника (вывод средств) -->
<symbol id="ic-cashout" viewBox="0 0 24 24">
  <rect x="3" y="11" width="18" height="10" rx="2.5"
        stroke="currentColor" stroke-width="2" fill="none"/>
  <line x1="12" y1="11" x2="12" y2="3.5"
        stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="8,7.5 12,3.5 16,7.5"
            stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="7.5" y1="16.5" x2="16.5" y2="16.5"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="7.5" y1="19" x2="13" y2="19"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
</symbol>

<!-- HOURGLASS: верхний конус + нижний конус + перетяжка + песок -->
<symbol id="ic-hourglass" viewBox="0 0 24 24">
  <line x1="5" y1="3" x2="19" y2="3"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="5" y1="21" x2="19" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M6.5 3 L17.5 3 L12 12 Z"
        stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"
        fill="currentColor" fill-opacity=".3"/>
  <path d="M6.5 21 L17.5 21 L12 12 Z"
        stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"
        fill="currentColor" fill-opacity=".7"/>
  <circle cx="12" cy="12" r="1.1" fill="currentColor"/>
</symbol>

<!-- LOCK: скоба дуга + корпус прямоугольник + замочная скважина -->
<symbol id="ic-lock" viewBox="0 0 24 24">
  <rect x="4" y="11" width="16" height="11" rx="3"
        stroke="currentColor" stroke-width="2" fill="none"/>
  <path d="M8 11 L8 7.5 Q8 3 12 3 Q16 3 16 7.5 L16 11"
        stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="12" cy="16" r="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
  <line x1="12" y1="18" x2="12" y2="20"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
</symbol>

<!-- MEDAL 1 (золото) -->
<symbol id="ic-medal1" viewBox="0 0 24 24">
  <path d="M9.5 2 L7 8 L10 7.5" stroke="#d4a000" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14.5 2 L17 8 L14 7.5" stroke="#d4a000" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="12" cy="15" r="7" stroke="#d4a000" stroke-width="2" fill="#d4a000" fill-opacity=".12"/>
  <line x1="10.5" y1="11.5" x2="12.5" y2="10.2"
        stroke="#d4a000" stroke-width="2" stroke-linecap="round"/>
  <line x1="12.5" y1="10.2" x2="12.5" y2="20"
        stroke="#d4a000" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="20" x2="15" y2="20"
        stroke="#d4a000" stroke-width="2" stroke-linecap="round"/>
</symbol>

<!-- MEDAL 2 (серебро) -->
<symbol id="ic-medal2" viewBox="0 0 24 24">
  <path d="M9.5 2 L7 8 L10 7.5" stroke="#909aaa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14.5 2 L17 8 L14 7.5" stroke="#909aaa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="12" cy="15" r="7" stroke="#909aaa" stroke-width="2" fill="#909aaa" fill-opacity=".12"/>
  <path d="M9.5 11.5 Q9.5 10 12 10 Q14.5 10 14.5 12.5 Q14.5 14.5 9.5 18 L14.5 18"
        stroke="#909aaa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="9.5" y1="20" x2="14.5" y2="20"
        stroke="#909aaa" stroke-width="2" stroke-linecap="round"/>
</symbol>

<!-- MEDAL 3 (бронза) -->
<symbol id="ic-medal3" viewBox="0 0 24 24">
  <path d="M9.5 2 L7 8 L10 7.5" stroke="#a06030" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14.5 2 L17 8 L14 7.5" stroke="#a06030" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="12" cy="15" r="7" stroke="#a06030" stroke-width="2" fill="#a06030" fill-opacity=".12"/>
  <path d="M9.5 10 L14 10 L11.5 14 Q15 14.5 15 17 Q15 20 12 20 Q9 20 9 17.5"
        stroke="#a06030" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</symbol>

<!-- STAR: 5-конечная звезда (маркер «моя ставка») -->
<symbol id="ic-star" viewBox="0 0 24 24">
  <path d="M12 3 L14.6 9.8 L22 10.3 L16.5 15.2 L18.4 22.5 L12 18.5 L5.6 22.5 L7.5 15.2 L2 10.3 L9.4 9.8 Z"
        fill="currentColor"/>
</symbol>

</defs>
</svg>

<!-- Header -->
<header class="header">
  <div class="logo">
    <svg class="logo-icon" aria-hidden="true"><use href="#ic-rocket"/></svg>
    CrashGame
  </div>
  <div class="header-right">
    <div class="balance-display">
      <svg class="icon icon-coin" aria-hidden="true"><use href="#ic-coin"/></svg>
      <span id="balance-amount">0</span>
    </div>
    <button class="btn-icon" onclick="openTab('leaderboard')" aria-label="Таблица лидеров">
      <svg class="icon" aria-hidden="true"><use href="#ic-trophy"/></svg>
    </button>
  </div>
</header>

<!-- Tabs -->
<nav class="tabs">
  <button class="tab active" data-tab="game"        onclick="openTab('game')">Игра</button>
  <button class="tab"        data-tab="history"     onclick="openTab('history')">История</button>
  <button class="tab"        data-tab="leaderboard" onclick="openTab('leaderboard')">Топ</button>
  <button class="tab"        data-tab="profile"     onclick="openTab('profile')">Профиль</button>
</nav>

<!-- ════════ GAME ════════ -->
<div id="tab-game" class="tab-content active">

  <div class="history-strip" id="history-strip"></div>

  <div class="game-area">
    <canvas id="crashCanvas"></canvas>
    <div class="multiplier-overlay" id="multiplier-overlay">
      <div class="multiplier-value waiting" id="multiplier-value">
        <svg class="icon icon-xl" style="color:var(--text2)"><use href="#ic-clock"/></svg>
      </div>
      <div class="multiplier-label" id="multiplier-label">Жди ставок...</div>
    </div>
    <div class="countdown-overlay" id="countdown-overlay" style="display:none">
      <div class="countdown-text">Старт через</div>
      <div class="countdown-value" id="countdown-value">6</div>
    </div>
  </div>

  <div class="bet-panel">
    <div class="bet-row">
      <div class="input-group">
        <label>Ставка</label>
        <div class="input-wrap">
          <input type="number" id="bet-amount" value="100" min="10" max="10000" step="10">
          <div class="quick-bets">
            <button onclick="setQuickBet(50)">50</button>
            <button onclick="setQuickBet(100)">100</button>
            <button onclick="setQuickBet(500)">500</button>
            <button onclick="halveBet()">½</button>
            <button onclick="doubleBet()">2x</button>
          </div>
        </div>
      </div>
      <div class="input-group">
        <label>
          <input type="checkbox" id="auto-cashout-check" onchange="toggleAutoCashout()">
          Авто вывод
        </label>
        <div class="input-wrap">
          <input type="number" id="auto-cashout-value" value="2.00" min="1.01" max="1000" step="0.01" disabled>
        </div>
      </div>
    </div>
    <div class="bet-actions">
      <button class="btn-bet" id="btn-bet" onclick="handleBetButton()">
        <svg class="btn-bet-icon" id="btn-bet-icon"><use id="btn-bet-icon-use" href="#ic-target"/></svg>
        <span id="btn-bet-text">Поставить</span>
      </button>
    </div>
  </div>

  <div class="bets-section">
    <h3>Активные ставки <span id="bets-count" class="badge">0</span></h3>
    <div class="bets-table-wrap">
      <table class="bets-table">
        <thead>
          <tr><th>Игрок</th><th>Ставка</th><th>Вывод</th><th>Профит</th></tr>
        </thead>
        <tbody id="bets-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ════════ HISTORY ════════ -->
<div id="tab-history" class="tab-content">
  <div class="section-title">История раундов</div>
  <div id="history-list" class="history-list"></div>
</div>

<!-- ════════ LEADERBOARD ════════ -->
<div id="tab-leaderboard" class="tab-content">
  <div class="section-title">
    <svg class="icon icon-sm" style="vertical-align:middle;margin-right:5px"><use href="#ic-trophy"/></svg>Таблица лидеров
  </div>
  <div id="leaderboard-list" class="leaderboard-list"></div>
</div>

<!-- ════════ PROFILE ════════ -->
<div id="tab-profile" class="tab-content">
  <div class="profile-card">
    <div class="profile-avatar" id="profile-avatar">?</div>
    <div class="profile-name" id="profile-name">Загрузка...</div>
    <div class="profile-username" id="profile-username"></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="stat-balance">0</div><div class="stat-label">Баланс</div></div>
    <div class="stat-card green"><div class="stat-value" id="stat-won">0</div><div class="stat-label">Выиграно</div></div>
    <div class="stat-card red"><div class="stat-value" id="stat-lost">0</div><div class="stat-label">Проиграно</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-games">0</div><div class="stat-label">Игр</div></div>
  </div>
  <div class="provably-fair">
    <h4>
      <svg class="icon icon-sm" style="vertical-align:middle;margin-right:5px"><use href="#ic-lock"/></svg>
      Честная игра (Provably Fair)
    </h4>
    <p>Каждый раунд имеет уникальный хэш, который можно проверить после игры.</p>
    <div class="hash-display">
      <label>Хэш текущего раунда:</label>
      <div id="current-hash" class="hash-value">Ожидание...</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="app.js"></script>
</body>
</html>
