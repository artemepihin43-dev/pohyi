<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>XYLIVPN</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Animated background -->
  <canvas id="bg-canvas"></canvas>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-shield">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="url(#sg)" stroke="rgba(99,179,237,0.4)" stroke-width="0.5"/><defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#667eea" stop-opacity="0.8"/><stop offset="100%" stop-color="#00d2ff" stop-opacity="0.6"/></linearGradient></defs><path d="M9 12l2 2 4-4" stroke="#00d2ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <h1>XYLI<span>VPN</span></h1>
          <p class="tagline">Защита · Скорость · Свобода</p>
        </div>
      </div>
      <div class="hdr-bal">
        <div class="hdr-bal-label">БАЛАНС</div>
        <div class="hdr-bal-val" id="balance-amount">—</div>
      </div>
    </header>

    <!-- Balance hero -->
    <div class="balance-hero">
      <div class="bh-left">
        <div class="bh-label">МОЙ БАЛАНС</div>
        <div class="bh-amount" id="hero-balance">0.00 ₽</div>
        <div class="bh-refs" id="referral-stat">Рефералов: 0 · Заработано: 0 ₽</div>
      </div>
      <button class="invite-btn" id="ref-btn">
        <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM6 8a2 2 0 11-4 0 2 2 0 014 0zM15.93 17c-.46-2.28-2.48-4-4.93-4s-4.47 1.72-4.93 4M18 18c0-1.66-1.34-3-3-3M2 18c0-1.66 1.34-3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Пригласить
      </button>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="shop">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 2a1 1 0 001 1h12M9 19a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Магазин
      </button>
      <button class="tab" data-tab="mykeys">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M8 11a3 3 0 100-6 3 3 0 000 6zm0 0l5 5m-2-2l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Мои ключи
      </button>
      <button class="tab" data-tab="referral">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M17 20H3a2 2 0 01-2-2v-1a5 5 0 015-5h6a5 5 0 015 5v1a2 2 0 01-2 2zM10 9a4 4 0 100-8 4 4 0 000 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Рефералы
      </button>
    </nav>

    <!-- МАГАЗИН -->
    <section id="tab-shop" class="tab-content active">
      <div class="features-row">
        <div class="feat-chip"><span>⚡</span>Мгновенно</div>
        <div class="feat-chip"><span>♾</span>Безлимит</div>
        <div class="feat-chip"><span>🌍</span>Везде</div>
        <div class="feat-chip"><span>🔒</span>Шифрование</div>
      </div>
      <div id="plans-list" class="plans-list">
        <div class="loader"><div class="spin"></div><span>Загрузка тарифов...</span></div>
      </div>
    </section>

    <!-- МОИ КЛЮЧИ -->
    <section id="tab-mykeys" class="tab-content">
      <div id="orders-list" class="orders-list">
        <div class="loader"><div class="spin"></div><span>Загрузка...</span></div>
      </div>
    </section>

    <!-- РЕФЕРАЛЫ -->
    <section id="tab-referral" class="tab-content">
      <div id="referral-page" class="referral-page">
        <div class="loader"><div class="spin"></div><span>Загрузка...</span></div>
      </div>
    </section>

  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
