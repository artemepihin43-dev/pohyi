<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>XYLIVPN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div class="noise"></div>
  <div class="glow-blob glow-1"></div>
  <div class="glow-blob glow-2"></div>

  <div id="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="currentColor" opacity=".9"/>
            <path d="M9 12l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-name">XYLIVPN</span>
      </div>
      <div class="header-balance" id="balance-amount">—</div>
    </header>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-info">
        <p class="hero-label">Мой баланс</p>
        <h2 class="hero-amount" id="hero-balance">0,00 ₽</h2>
        <p class="hero-sub" id="referral-stat">Рефералов: 0 · Заработано: 0 ₽</p>
      </div>
      <button class="invite-btn" id="ref-btn">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
          <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM6 8a2 2 0 11-4 0 2 2 0 014 0zM15.93 17c-.46-2.28-2.48-4-4.93-4s-4.47 1.72-4.93 4M18 18c0-1.66-1.34-3-3-3M2 18c0-1.66 1.34-3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Пригласить
      </button>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="shop">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Магазин</span>
      </button>
      <button class="tab" data-tab="mykeys">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Ключи</span>
      </button>
      <button class="tab" data-tab="referral">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Рефералы</span>
      </button>
    </nav>

    <!-- МАГАЗИН -->
    <section id="tab-shop" class="tab-content active">
      <div class="pills-row">
        <div class="pill">⚡ Мгновенно</div>
        <div class="pill">♾ Безлимит</div>
        <div class="pill">🌍 Везде</div>
        <div class="pill">🔒 Шифрование</div>
      </div>
      <div id="plans-list" class="plans-list">
        <div class="loader"><div class="spin"></div></div>
      </div>
    </section>

    <!-- МОИ КЛЮЧИ -->
    <section id="tab-mykeys" class="tab-content">
      <div id="orders-list">
        <div class="loader"><div class="spin"></div></div>
      </div>
    </section>

    <!-- РЕФЕРАЛЫ -->
    <section id="tab-referral" class="tab-content">
      <div id="referral-page">
        <div class="loader"><div class="spin"></div></div>
      </div>
    </section>

  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
